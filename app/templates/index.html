<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO管理アプリ - AWS 3層構成ポートフォリオ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .header-badge { font-size: 0.75rem; }
    .todo-done td { text-decoration: line-through; color: #6c757d; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand fw-bold">📋 TODO 管理アプリ</span>
      <span class="badge bg-warning text-dark header-badge">AWS EC2 + RDS + ALB</span>
    </div>
  </nav>

  <div class="container" style="max-width: 720px;">

    <!-- 追加フォーム -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <form action="/add" method="post" class="d-flex gap-2">
          <input type="text" name="title" class="form-control"
                 placeholder="新しいTODOを入力..." required maxlength="255">
          <button type="submit" class="btn btn-primary px-4">追加</button>
        </form>
      </div>
    </div>

    <!-- TODOリスト -->
    <div class="card shadow-sm">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span class="fw-bold">TODOリスト</span>
        <span class="badge bg-secondary">{{ todos|length }} 件</span>
      </div>
      <div class="card-body p-0">
        {% if todos %}
        <table class="table table-hover mb-0">
          <tbody>
            {% for todo in todos %}
            <tr class="{{ 'todo-done' if todo.done else '' }}">
              <td class="py-3 px-4">{{ todo.title }}</td>
              <td class="py-2 px-2 text-end" style="white-space: nowrap;">
                <form action="/done/{{ todo.id }}" method="post" class="d-inline">
                  <button type="submit" class="btn btn-sm {{ 'btn-secondary' if todo.done else 'btn-success' }}">
                    {{ '元に戻す' if todo.done else '完了' }}
                  </button>
                </form>
                <form action="/delete/{{ todo.id }}" method="post" class="d-inline ms-1">
                  <button type="submit" class="btn btn-sm btn-outline-danger">削除</button>
                </form>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
        {% else %}
        <p class="text-center text-muted py-4">TODOがありません。上のフォームから追加してください。</p>
        {% endif %}
      </div>
    </div>

    <p class="text-center text-muted mt-4" style="font-size: 0.8rem;">
      Powered by AWS EC2 + RDS (MySQL) + ALB | Flask 3.0 | Terraform IaC
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
